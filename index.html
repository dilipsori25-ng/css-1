<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Responsive Product Card UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
            <h2>Trending footwear this Summer</h2>

    <div class="container">
        <div class="card">
            <img src="foot1.webp" alt="footwear" >
            <div class="card-content">
              <p>Trending boots and footwear </p>
                <strong>499&#8377;</strong>
             
            </div>
        </div>

         <div class="card">
            <img src="foot2.webp" alt="footwear" >
            <div class="card-content">
               <p>puma shoes</p>
               <strong>399&#8377;</strong>
            </div>
        </div>

         <div class="card">
            <img src="foot3.webp" alt="footwear" >
            <div class="card-content">
                <p>stylish sneaker</p>
                  <strong>567&#8377;</strong>
              
            </div>
        </div>

         <div class="card">
            <img src="foot6.webp" alt="footwear" >
            <div class="card-content">
              <p>party wear</p>
                   <strong>654&#8377;</strong>
           
            </div>
        </div>

         <div class="card">
            <img src="foot5.webp" alt="footwear" >
            <div class="card-content">
               <p>sports shoes</p>
                 <strong>999&#8377;</strong>
              
            </div>
        </div>
    </div>
    

    </div>
    
</body>
</html>
